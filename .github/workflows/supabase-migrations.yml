name: Supabase Migrations Deploy

on:
  push:
    branches:
      - release
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate-release:
    name: Apply migrations to release
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL_RELEASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply SQL migrations (idempotent)
        run: |
          set -euo pipefail

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing SUPABASE_DB_URL_RELEASE secret"
            exit 1
          fi

          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            CREATE TABLE IF NOT EXISTS public.schema_migrations (
              filename text PRIMARY KEY,
              applied_at timestamptz NOT NULL DEFAULT now()
            );
          "

          for file in $(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            filename=$(basename "$file")
            applied=$(psql "$DATABASE_URL" -tAc "SELECT 1 FROM public.schema_migrations WHERE filename = '$filename' LIMIT 1")

            if [ "$applied" = "1" ]; then
              echo "Skipping already applied migration: $filename"
              continue
            fi

            echo "Applying migration: $filename"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO public.schema_migrations (filename) VALUES ('$filename');"
          done

  migrate-prod:
    name: Apply migrations to production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL_PROD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply SQL migrations (idempotent)
        run: |
          set -euo pipefail

          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing SUPABASE_DB_URL_PROD secret"
            exit 1
          fi

          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            CREATE TABLE IF NOT EXISTS public.schema_migrations (
              filename text PRIMARY KEY,
              applied_at timestamptz NOT NULL DEFAULT now()
            );
          "

          for file in $(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            filename=$(basename "$file")
            applied=$(psql "$DATABASE_URL" -tAc "SELECT 1 FROM public.schema_migrations WHERE filename = '$filename' LIMIT 1")

            if [ "$applied" = "1" ]; then
              echo "Skipping already applied migration: $filename"
              continue
            fi

            echo "Applying migration: $filename"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "INSERT INTO public.schema_migrations (filename) VALUES ('$filename');"
          done
